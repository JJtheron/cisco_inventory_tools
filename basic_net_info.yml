---

- name: Network Getting Started First Playbook
  connection: ansible.netcommon.network_cli
  gather_facts: false
  hosts: all
  vars_prompt:
    - name: enpassword
      prompt: What is en passoword?
  vars:
    ansible_become_password: "{{enpassword}}"
  tasks:

    - name: Get config for Ios devices
      cisco.ios.ios_facts:
        gather_subset:
          - config 

    - name: Display the config
      debug:
        msg: "{{ ansible_net_hostname }},{{ ansible_net_model }},{{ ansible_net_version }}, {{ ansible_net_stacked_serialnums }}"
       
    
    - name: Save all to file
      copy:
        content: "{{ ansible_net_config }}"
        dest: "./CottageGrove/{{ ansible_net_hostname }}_sh_run.txt" 
